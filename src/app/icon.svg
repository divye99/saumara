<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#1C3A2E"/>

  <!-- Center petal (tallest) -->
  <ellipse cx="50" cy="36" rx="8" ry="22" fill="#C9A96E"/>

  <!-- Left inner petal -->
  <ellipse cx="34" cy="43" rx="7" ry="19" fill="#C9A96E" transform="rotate(-28 34 43)"/>

  <!-- Right inner petal -->
  <ellipse cx="66" cy="43" rx="7" ry="19" fill="#C9A96E" transform="rotate(28 66 43)"/>

  <!-- Left outer petal -->
  <ellipse cx="19" cy="52" rx="5.5" ry="15" fill="#C9A96E" transform="rotate(-52 19 52)"/>

  <!-- Right outer petal -->
  <ellipse cx="81" cy="52" rx="5.5" ry="15" fill="#C9A96E" transform="rotate(52 81 52)"/>

  <!-- Stem -->
  <rect x="46.5" y="58" width="7" height="13" rx="2" fill="#C9A96E"/>

  <!-- Water ripple line -->
  <path d="M18 74 Q50 68 82 74" stroke="#C9A96E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
